# =============================================================================
# Configuracao declarativa — EsportsPulse
#
# IDs verificados via resolver_handle.py em 2026-07-09.
#
# DOMINIO UNICO ("esports"): cada canal aqui e uma ORGANIZACAO institucional
# (FURIA/LOUD/paiN...), nao um jogo. Uma mesma org publica sobre varias
# modalidades (CS2, Valorant, LoL, Free Fire...) no mesmo canal — por isso
# nao ha mais campo "game" fixo por canal. O jogo de cada VIDEO e descoberto
# a partir da propria transcricao (ver ingestor/pipeline.py:_detectar_jogo
# e o dict "jogos" em config/sinais.yaml), nao do cadastro do canal.
#
# Nao ha campo "vocabulario" aqui. Os termos analiticos estao em
# sinais.yaml e sao compartilhados por todos os canais — o objetivo
# eh detectar tipo de conteudo (jogo vs. entretenimento), resultado
# comentado (vitoria/derrota) e modalidade (jogo_detectado) que se
# aplicam igualmente a qualquer ORG de esports.
#
# Como descobrir um novo channel_id:
#   python -m ingestor.scripts.resolver_handle @handle
# =============================================================================

canais:

  - nome: "FURIA eSports"
    channel_id: "UCT1F3iuRk0j7owMzNC09q1w"   # @FURIAgg
    dominio: "esports"
    duracao_min_seg: 300        # ignora shorts e clips (< 5 min)
    # 3x/dia (480 min = 8h) -- temporario, pra observar em quais janelas do
    # dia a VPS consegue captar transcricao sem tomar bloqueio de IP (ver
    # docs/RUNBOOK.md). Reverter pra 1440 (1x/dia) depois da observacao.
    intervalo_min: 480
    # Teto de videos por ciclo, SEMPRE (carga inicial e ciclos seguintes) —
    # reduzido de 25 pra 10 (2026-07) e depois pra 3 (2026-07, observacao de
    # bloqueio de IP): rajada ainda menor de transcricao (o backlog de FAILED
    # retenta todo ciclo, entao um teto baixo evita empilhar tentativas) e
    # volume comparavel entre times nessa primeira carga (comparar 20 video
    # da FURIA com 2 do LOUD enviesava a analise).
    max_videos_por_ciclo: 3
    ativo: true

  - nome: "LOUD"
    channel_id: "UC7iwNp4GUynlGXvK-6KD0Rw"   # @loudgg
    dominio: "esports"
    duracao_min_seg: 300
    intervalo_min: 480
    max_videos_por_ciclo: 3
    ativo: true

  - nome: "paiN Gaming"
    channel_id: "UC0jnW-v_1IanHuj2y3Z1AGA"   # @paingamingbr
    dominio: "esports"
    duracao_min_seg: 300
    intervalo_min: 480
    max_videos_por_ciclo: 3
    ativo: true

  - nome: "MIBR"
    channel_id: "UCE30pLfsQQWijIN0RYFoESA"   # @mibr
    dominio: "esports"
    duracao_min_seg: 300
    intervalo_min: 480
    max_videos_por_ciclo: 3
    ativo: true

  - nome: "Fluxo"
    channel_id: "UCUSKHWPgQl1ixaal1vysMyw"   # @Fluxo_Esports
    dominio: "esports"
    duracao_min_seg: 300
    intervalo_min: 480
    max_videos_por_ciclo: 3
    ativo: true


# Parametros globais
global:
  idiomas_legenda: ["pt", "pt-BR", "en"]
  # Modo demo: gera dados sinteticos deterministicos com termos de esports.
  # Permite rodar e apresentar o pipeline sem API key e sem gastar cota.
  modo_demo: false
  # Janela de descoberta, usada em TODO ciclo (inicial e incremental). 365
  # (2026-07, subiu de 90): canal que posta pouco pode nao ter 10 videos de
  # duracao minima nos ultimos 90 dias -- aumentar a janela e' barato (so
  # mais paginacao no playlistItems.list, 1 unidade/pagina, nem toca a API
  # de transcricao) e nao aumenta a rajada real (o teto de max_videos_por_
  # ciclo continua igual, so escolhe os 10 de um historico maior).
  janela_descoberta_dias: 365
