# =============================================================================
# Configuracao declarativa — EsportsPulse
#
# IDs verificados via resolver_handle.py em 2026-07-09.
#
# DIFERENCA em relacao ao modelo didatico:
#   Nao ha campo "vocabulario" aqui. Os termos analiticos estao em
#   sinais.yaml e sao compartilhados por todos os canais — o objetivo
#   eh detectar eventos (clutch, virada, polemica...) que se aplicam
#   igualmente a qualquer ORG de esports.
#
# Como descobrir um novo channel_id:
#   python -m ingestor.scripts.resolver_handle @handle
# =============================================================================

canais:

  - nome: "FURIA eSports"
    channel_id: "UCT1F3iuRk0j7owMzNC09q1w"   # @FURIAgg
    dominio: "cs2"
    game: "cs2"
    duracao_min_seg: 300        # ignora shorts e clips (< 5 min)
    intervalo_min: 60
    max_videos_por_ciclo: 5
