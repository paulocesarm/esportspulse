# Parametros globais
global:
  idiomas_legenda: ["pt", "pt-BR", "en"]
  # Modo demo: gera dados sinteticos deterministicos com termos de esports.
  # Permite rodar e apresentar o pipeline sem API key e sem gastar cota.
  modo_demo: false
  # Incremental: janela usada nos ciclos seguintes (apos watermark estabelecido).
  janela_descoberta_dias: 90
  # Pausa entre chamadas de transcricao (youtube_transcript_api), em segundos.
  # Evita rajada de requisicoes que leva a IpBlocked — sobretudo relevante em
  # rede compartilhada (ex.: laboratorio/sala de aula com varios alunos no
  # mesmo IP publico batendo na mesma API ao mesmo tempo).
  transcript_delay_seg: 2
